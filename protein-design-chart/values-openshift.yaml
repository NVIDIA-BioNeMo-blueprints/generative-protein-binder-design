# values-openshift.yaml — OpenShift overlay for the Protein Design Blueprint.
#
# Usage:
#   helm install protein-design . \
#     -f values.yaml \
#     -f values-openshift.yaml \
#     --set imagePullSecret.secretName=ngc-registry-secret \
#     -n protein-design
#
# This file enables OpenShift-specific resources (Routes, SCC RoleBindings)
# and switches from standard Deployments to NIM Operator managed services.
# Cluster-specific values (namespace, NGC keys) should be passed via --set.

# ---------------------------------------------------------------------------
# Shorten the chart fullname to avoid exceeding the 63-character DNS label
# limit on auto-generated Route hostnames.
# ---------------------------------------------------------------------------
fullnameOverride: "protein-design"

# ---------------------------------------------------------------------------
# Disable standard Deployments — NIM Operator manages the NIM lifecycle.
# ---------------------------------------------------------------------------
replicaCount: 0

# ---------------------------------------------------------------------------
# OpenShift features
# ---------------------------------------------------------------------------
openshift:
  enabled: true

  routes:
    alphafold2:
      enabled: true
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
    rfdiffusion:
      enabled: true
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
    proteinmpnn:
      enabled: true
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
    alphafold2multimer:
      enabled: true
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect

  # Creates a custom SCC (protein-design-nim) that is like "nonroot" but
  # with seLinuxContext: RunAsAny.  This prevents the kubelet from
  # recursively relabeling every file on mounted volumes — critical for
  # AlphaFold2's 2TB PVCs with millions of genomic database files.
  scc:
    create: true

# ---------------------------------------------------------------------------
# Override service type — Routes handle external access on OpenShift.
# ---------------------------------------------------------------------------
service:
  type: ClusterIP

# ---------------------------------------------------------------------------
# Persistence — OpenShift dynamic provisioning (no hostPath PV needed).
# Set storageClass to match your cluster (e.g. "gp3-csi", "ocs-storagecluster-cephfs").
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: "gp3-csi"
  accessMode: ReadWriteMany
  size: 1.5Ti

# ---------------------------------------------------------------------------
# NIM Operator integration — each NIM gets a NIMCache + NIMService pair.
# The NIM Operator handles model downloading, caching, and GPU scheduling.
# Requires: NIM Operator installed, NGC image-pull and API secrets in namespace.
# ---------------------------------------------------------------------------
nimOperator:
  alphafold2:
    enabled: true
    replicas: 1
    service:
      name: "alphafold2"
    image:
      repository: nvcr.io/nim/deepmind/alphafold2
      tag: "2.1"
      pullPolicy: Always
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    storage:
      pvc:
        create: true
        size: "2000Gi"
        volumeAccessMode: ReadWriteOnce
        storageClass: "gp3-csi"
    nodeSelector: {}
    # Tolerate GPU node taints so cache and service pods can schedule.
    # Adjust keys to match your cluster's GPU node taints.
    tolerations:
      - key: g6-gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: p4-gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    env:
      - name: NIM_HTTP_API_PORT
        value: "8000"
      - name: NIM_CACHE_PATH
        value: "/model-store"
      - name: TOKENIZERS_PARALLELISM
        value: "false"
    expose:
      service:
        name: http
        type: ClusterIP
        port: 8000
    startupProbe:
      enabled: true
      probe:
        httpGet:
          path: /v1/health/ready
          port: 8000
        initialDelaySeconds: 120
        periodSeconds: 30
        failureThreshold: 720

  rfdiffusion:
    enabled: true
    replicas: 1
    service:
      name: "rfdiffusion"
    image:
      repository: nvcr.io/nim/ipd/rfdiffusion
      tag: "2.0"
      pullPolicy: Always
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    storage:
      pvc:
        create: true
        size: "350Gi"
        volumeAccessMode: ReadWriteOnce
        storageClass: ""
    nodeSelector: {}
    tolerations:
      - key: g6-gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: p4-gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    env:
      - name: NIM_HTTP_API_PORT
        value: "8000"
      - name: NIM_CACHE_PATH
        value: "/home/nvs/.cache/nim/models"
      - name: TOKENIZERS_PARALLELISM
        value: "false"
    expose:
      service:
        name: http
        type: ClusterIP
        port: 8000
    # RFDiffusion compiles TensorRT engines on FIRST-EVER start for a given
    # GPU architecture.  This one-time build can take 2-4 hours.  The compiled
    # engines are cached in ephemeral container storage, so subsequent pod
    # restarts on the same node reuse them — but a rollout (new ReplicaSet)
    # loses the cache and forces a full rebuild.
    # failureThreshold: 720 × periodSeconds: 30 = 6 hours headroom.
    startupProbe:
      enabled: true
      probe:
        httpGet:
          path: /v1/health/ready
          port: 8000
        initialDelaySeconds: 120
        periodSeconds: 30
        failureThreshold: 720

  proteinmpnn:
    enabled: true
    replicas: 1
    service:
      name: "proteinmpnn"
    image:
      repository: nvcr.io/nim/ipd/proteinmpnn
      tag: "1.0"
      pullPolicy: Always
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    storage:
      pvc:
        create: true
        size: "100Gi"
        volumeAccessMode: ReadWriteOnce
        storageClass: ""
    nodeSelector: {}
    tolerations:
      - key: g6-gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: p4-gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    env:
      - name: NIM_HTTP_API_PORT
        value: "8000"
      - name: NIM_CACHE_PATH
        value: "/home/nvs/.cache/nim/models"
      - name: TOKENIZERS_PARALLELISM
        value: "false"
    expose:
      service:
        name: http
        type: ClusterIP
        port: 8000
    startupProbe:
      enabled: true
      probe:
        httpGet:
          path: /v1/health/ready
          port: 8000
        initialDelaySeconds: 120
        periodSeconds: 30
        failureThreshold: 120

  alphafold2-multimer:
    enabled: true
    replicas: 1
    service:
      name: "alphafold2-multimer"
    image:
      repository: nvcr.io/nim/deepmind/alphafold2-multimer
      tag: "2.1"
      pullPolicy: Always
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    storage:
      pvc:
        create: true
        size: "2000Gi"
        volumeAccessMode: ReadWriteOnce
        storageClass: "gp3-csi"
    nodeSelector: {}
    tolerations:
      - key: g6-gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: p4-gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    env:
      - name: NIM_HTTP_API_PORT
        value: "8000"
      - name: NIM_CACHE_PATH
        value: "/model-store"
      - name: TOKENIZERS_PARALLELISM
        value: "false"
    expose:
      service:
        name: http
        type: ClusterIP
        port: 8000
    startupProbe:
      enabled: true
      probe:
        httpGet:
          path: /v1/health/ready
          port: 8000
        initialDelaySeconds: 120
        periodSeconds: 30
        failureThreshold: 360
