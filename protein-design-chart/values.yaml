# Default values for protein-design-chart.

replicaCount: 1

openfold3:
  containerName: openfold3
  containerPort: 8000
  repository: nvcr.io/nim/openfold/openfold3
  tag: "1.5"
  pullPolicy: Always
  cacheFolder: /opt/nim/.cache
  servicePort: 8081

rfdiffusion:
  containerName: rfdiffusion
  containerPort: 8000
  repository: nvcr.io/nim/ipd/rfdiffusion
  tag: "2.0"
  pullPolicy: Always
  cacheFolder: /home/nvs/.cache
  servicePort: 8082

proteinmpnn:
  containerName: proteinmpnn
  containerPort: 8000
  repository: nvcr.io/nim/ipd/proteinmpnn
  tag: "1.0"
  pullPolicy: Always
  cacheFolder: /home/nvs/.cache
  servicePort: 8083

imagePullSecret:
  registry: "nvcr.io"
  name: "ngc-secret-protein-design"
  create: true
  username: '$oauthtoken'
  secretName: ngc-registry-secret
  secretKey: NGC_REGISTRY_KEY

service:
  type: ClusterIP

nameOverride: ""
fullnameOverride: ""

# serviceAccount:
#   # Specifies whether a service account should be created
#   create: true
#   # Annotations to add to the service account
#   annotations: {}
#   # The name of the service account to use.
#   # If not set and create is true, a name is generated using the fullname template
#   name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  existingClaim: ""
  storageClass: standard
  accessMode: ReadWriteMany
  hostPath: /data/nim
  size: 100Gi

nodeSelector: {}

tolerations: []

affinity: {}
 